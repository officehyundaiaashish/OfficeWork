        async function syncWithSupabase() {
            const client = getSupabase();
            if (!client) {
                showToast('Please configure Supabase URL and Key first');
                return;
            }

            const btn = document.getElementById('sb-sync-btn');
            const originalText = btn.textContent;
            btn.textContent = 'Syncing...';
            btn.disabled = true;

            try {
                const { data: remoteRecords, error } = await client.from('tasks').select('*');
                if (error) throw error;

                // Sync theme settings if found
                const remoteTheme = remoteRecords.find(r => r.id === '_settings_theme');
                if (remoteTheme && remoteTheme.note) {
                    try {
                        const parsed = JSON.parse(remoteTheme.note);
                        theme = { ...theme, ...parsed };
                        saveTheme();
                        applyTheme();
                    } catch (e) {
                        console.error('Failed to parse remote theme:', e);
                    }
                }

                // Sync recycle bin (deleted tasks) if found
                const remoteDeleted = remoteRecords.find(r => r.id === '_settings_deleted_tasks');
                if (remoteDeleted && remoteDeleted.note) {
                    try {
                        const parsed = JSON.parse(remoteDeleted.note);
                        if (Array.isArray(parsed)) {
                            deletedTasks = parsed.slice(0, 50);
                            saveDeletedTasks();
                        }
                    } catch (e) {
                        console.error('Failed to parse remote deleted tasks:', e);
                    }
                }

                // Filter out settings records for task list merging
                const remoteTasks = remoteRecords.filter(r => !r.id.startsWith('_settings_'));
                const isFirstSync = localStorage.getItem('supabaseCredentialsEntered') === 'true';

                if (isFirstSync && remoteTasks.length > 0) {
                    // SERVER DATA IS PRIME: Completely overwrite local tasks with remote tasks
                    tasks = remoteTasks.map(sanitizeTask);
                    saveTasks();
                    renderBoard();
                    localStorage.removeItem('supabaseCredentialsEntered');
                } else {
                    // Normal bidirectional merge, but server data takes absolute priority in case of conflicts
                    const remoteMap = new Map(remoteTasks.map(t => [t.id, t]));
                    const localMap = new Map(tasks.map(t => [t.id, t]));

                    const toUpsert = [];
                    const merged = [];
                    const allIds = new Set([...localMap.keys(), ...remoteMap.keys()]);

                    for (const id of allIds) {
                        const local = localMap.get(id);
                        const remote = remoteMap.get(id);

                        if (local && remote) {
                            const localTime = local.createdAt || 0;
                            const remoteTime = remote.createdAt || 0;
                            if (localTime > remoteTime) {
                                const sanitized = sanitizeTask(local);
                                merged.push(sanitized);
                                toUpsert.push(sanitized);
                            } else {
                                const mergedTask = {
                                    id: remote.id,
                                    title: remote.title,
                                    note: remote.note,
                                    date: remote.date,
                                    time: remote.time,
                                    completed: remote.completed,
                                    createdAt: remote.createdAt
                                };
                                merged.push(mergedTask);
                            }
                        } else if (local) {
                            // Only upload local tasks that are not seed tasks (e.g. have a timestamp or standard uid format)
                            const sanitized = sanitizeTask(local);
                            merged.push(sanitized);
                            toUpsert.push(sanitized);
                        } else if (remote) {
                            const sanitized = sanitizeTask(remote);
                            merged.push(sanitized);
                        }
                    }

                    if (toUpsert.length > 0) {
                        const { error: upsertError } = await client.from('tasks').upsert(toUpsert);
                        if (upsertError) throw upsertError;
                    }

                    tasks = merged;
                    saveTasks();
                    renderBoard();
                    if (isFirstSync) localStorage.removeItem('supabaseCredentialsEntered');
                }

                // Upload local settings & deletedTasks to Supabase to keep them fully in sync
                const settingsRecord = {
                    id: '_settings_theme',
                    title: 'Theme Settings',
                    note: JSON.stringify({
                        accentHex: theme.accentHex,
                        accentRgb: theme.accentRgb,
                        layout: theme.layout,
                        fontScale: theme.fontScale,
                        density: theme.density
                    }),
                    date: 'legacy',
                    time: '',
                    completed: false,
                    createdAt: Date.now()
                };
                const deletedRecord = {
                    id: '_settings_deleted_tasks',
                    title: 'Deleted Tasks',
                    note: JSON.stringify(deletedTasks),
                    date: 'legacy',
                    time: '',
                    completed: false,
                    createdAt: Date.now()
                };
                await client.from('tasks').upsert([settingsRecord, deletedRecord]);

                updateSupabaseStatus();

                // Animate logo and sync icon on success
                animateSyncSuccess();
            } catch (e) {
                showToast('Sync failed: ' + e.message);
                console.error('Supabase sync error:', e);
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        }

        // ===== RECYCLE BIN =====

        function renderTrashList() {
            const ul = document.getElementById('trash-list');
            if (deletedTasks.length === 0) {
                ul.innerHTML = '<li style="padding:1rem; text-align:center; color:var(--text-muted);">Bin is empty</li>';
                return;
            }
            ul.innerHTML = deletedTasks.map(t => `
                <li style="display:flex; justify-content:space-between; align-items:center; padding:0.6rem; border:1px solid var(--border); border-radius:8px; margin-bottom:0.4rem; gap:0.5rem; background:var(--hover);">
                    <div style="min-width:0; display:flex; flex-direction:column; align-items:flex-start; text-align:left;">
                        <span style="font-weight:600; font-size:0.88rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:200px;">${escapeHtml(t.title)}</span>
                        <span style="font-size:0.75rem; color:var(--text-muted);">${escapeHtml(formatDate(t.date))}</span>
                    </div>
                    <button class="btn btn-secondary btn-sm" onclick="restoreTask('${t.id}')" style="min-height:30px; padding:0.2rem 0.5rem; display:inline-flex; align-items:center; gap:0.25rem;">
                        ${ICONS.undo} Undo
                    </button>
                </li>
            `).join('');
        }

        function restoreTask(taskId) {
            const tIdx = deletedTasks.findIndex(x => x.id === taskId);
            if (tIdx === -1) return;
            const taskObj = deletedTasks[tIdx];
            deletedTasks.splice(tIdx, 1);
            saveDeletedTasks();
            
            taskObj.createdAt = Date.now();
            tasks.push(taskObj);
            saveTasks();
            
            renderTrashList();
            renderBoard();
            showToast('Task restored');

            const client = getSupabase();
            if (client) {
                client.from('tasks').upsert(sanitizeTask(taskObj)).then(({ error }) => {
                    if (error) {
                        console.error('Supabase auto-save error:', error);
                        showToast('Sync failed: ' + error.message);
                    } else {
                        animateSyncSuccess();
                    }
                });
            }
            syncDeletedTasksToSupabase();
        }

                okText: 'Empty Bin',

                renderTrashList();
                showToast('Trash emptied');

        // ===== INIT =====
        applyTheme();
        renderBoard();

        // Background Sync trigger
        setTimeout(async () => {
            if (getSupabase()) {
                await syncWithSupabase();
                initRealtimeListener();
            }
        }, 1000);

        // Keyboard shortcuts
        document.addEventListener('keydown', e => {
            const inField = ['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName);
            if (e.key === 'n' && !inField) { e.preventDefault(); openAddModal(); }
            if (e.key === 'Escape') {
                document.querySelectorAll('.modal-overlay.active').forEach(m => m.classList.remove('active'));
            }
        });

        // PWA Install Prompt Flow
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', e => {
            e.preventDefault();
            deferredPrompt = e;
            const pwaChoice = localStorage.getItem('pwaPromptChoice');
            if (pwaChoice !== 'dismissed') {
                const banner = document.getElementById('pwa-install-banner');
                if (banner) banner.classList.add('show');
            }
        });

        function dismissPwaPrompt() {
            const banner = document.getElementById('pwa-install-banner');
            if (banner) banner.classList.remove('show');
            localStorage.setItem('pwaPromptChoice', 'dismissed');
        }

        async function triggerPwaInstall() {
            const banner = document.getElementById('pwa-install-banner');
            if (banner) banner.classList.remove('show');
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            console.log(`User response to PWA install: ${outcome}`);
            deferredPrompt = null;
        }

        // PWA Service Worker Registration (Blob-based inline with virtual file hosting)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const manifestJson = {
                    name: "Tasker",
                    short_name: "Tasker",
                    start_url: "./index.html",
                    display: "standalone",
                    background_color: "#f0f2f5",
                    theme_color: "#f0f2f5",
                    description: "Premium Task Manager App",
                    icons: [
                        {
                            src: "icon.svg",
                            sizes: "192x192 512x512",
                            type: "image/svg+xml",
                            purpose: "any maskable"
                        }
                    ]
                };

                const iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <rect width="512" height="512" rx="128" fill="#f0f2f5"/>
  <circle cx="256" cy="256" r="200" stroke="#0084ff" stroke-width="24"/>
  <path d="M160 270l64 64 128-128" stroke="#0084ff" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
</svg>`;

                const swCode = `
                    const CACHE_NAME = 'tasker-v1';
                    const MANIFEST = ${JSON.stringify(manifestJson)};
                    const ICON = \`${iconSvg}\`;

                    self.addEventListener('install', e => {
                        self.skipWaiting();
                    });
                    self.addEventListener('activate', e => {
                        e.waitUntil(clients.claim());
                    });
                    self.addEventListener('fetch', e => {
                        const url = new URL(e.request.url);
                        if (url.pathname.endsWith('manifest.json')) {
                            e.respondWith(new Response(JSON.stringify(MANIFEST), {
                                headers: { 'Content-Type': 'application/json' }
                            }));
                            return;
                        }
                        if (url.pathname.endsWith('icon.svg')) {
                            e.respondWith(new Response(ICON, {
                                headers: { 'Content-Type': 'image/svg+xml' }
                            }));
                            return;
                        }
                        e.respondWith(
                            caches.match(e.request).then(response => {
                                return response || fetch(e.request).catch(() => new Response("Offline"));
                            })
                        );
                    });
                `;
                const blob = new Blob([swCode], { type: 'application/javascript' });
                const url = URL.createObjectURL(blob);
                navigator.serviceWorker.register(url).catch(err => console.log('SW registration failed:', err));
            });
        }
    </script>
</body>
</html>
